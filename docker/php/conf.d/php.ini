; PHP Configuration for Noho
; This file is copied during Docker build BEFORE composer install

; Memory limit - increased for composer operations
memory_limit = 2G

; Upload limits
upload_max_filesize = 64M
post_max_size = 64M

; Execution time
max_execution_time = 300

; Timezone
date.timezone = Europe/Paris

; Error reporting (will be overridden by APP_DEBUG in Symfony)
display_errors = Off
log_errors = On

; OPcache settings for production
opcache.enable = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0

; IMPORTANT (Docker dev): compose.yaml mounts zzz-dev-opcache.ini which sets
; validate_timestamps=1 so code changes under ./:/app are picked up without restarting PHP.
; If that mount is missing, run: docker compose restart php